<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Hardening base (não-quebrável). A CSP COMPLETA (script-src/connect-src travados no
         domínio da API) deve ser aplicada no CloudFront — ver README (Segurança). -->
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>t2c_data</title>
    <script>
      // No-FOUC: aplica o tema salvo antes da primeira pintura.
      (function () {
        try {
          var t = localStorage.getItem("t2c.theme");
          if (t && ["teal", "corporate", "minimal"].indexOf(t) >= 0) {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
